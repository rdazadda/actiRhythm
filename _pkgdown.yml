url: https://rdazadda.github.io/actiRhythm/

template:
  bootstrap: 5
  bslib:
    primary: "#1e3a5f"
    secondary: "#f4a900"
    navbar-bg: "#1e3a5f"
    navbar-fg: "#ffffff"
    link-color: "#2c5282"
    headings-color: "#1e3a5f"

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  bg: primary
  type: dark
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/rdazadda/actiRhythm
      aria-label: GitHub

reference:
- title: Reading & preparing data
  desc: >
    Read ActiGraph counts and raw multi-brand accelerometer files, compute and
    calibrate raw metrics, detect non-wear, and access the bundled example data.
  contents:
  - read.agd
  - agd.counts
  - write.agd
  - gt3x.to.agd
  - has.inclinometer
  - read.actigraph.csv
  - counts.from.data.frame
  - read.raw
  - gt3x.counts
  - axivity.counts
  - geneactiv.counts
  - raw.metrics
  - auto.calibrate
  - detect.nonwear.choi
  - detect.nonwear.troiano
  - detect.nonwear.raw
  - example_agd
  - example_raw

- title: Nonparametric rhythm metrics
  desc: >
    Shape-free descriptors of the rest-activity rhythm: IS, IV, RA, L5/M10, and
    fragmentation, with no assumed waveform.
  contents:
  - circadian-analysis
  - circadian.rhythm
  - intradaily.variability.multiscale
  - circadian.is.multiscale
  - dichotomy.index
  - circadian.quotient
  - activity.balance.index
  - rest.activity.fragmentation
  - transition.probability
  - state.transitions
  - activity.extrema

- title: Cosinor models
  desc: >
    Sinusoidal rhythm models from the single cosinor and its rhythmicity test
    through extended, multicomponent, population-mean, and group-comparison fits.
  contents:
  - cosinor.analysis
  - rhythmicity.test
  - cosinor.confidence.ellipse
  - cosinor.extended
  - cosinor.antilogistic
  - cosinor.multicomponent
  - population.cosinor
  - cosinor.compare
  - consensus.rhythmicity

- title: Period & spectral analysis
  desc: >
    Estimate the free-running period and track how it drifts: Lomb-Scargle and
    chi-square periodograms, a bootstrap CI, a spectrogram, and ultradian power.
  contents:
  - circadian-period
  - circadian.period
  - period.ci
  - chi.sq.periodogram
  - circadian.spectrogram
  - ultradian.bandpower
  - residual.spectrum

- title: Fractal & nonlinear dynamics
  desc: >
    Long-range correlation and complexity of the activity series.
  contents:
  - circadian-fractal
  - fractal.dfa
  - mfdfa
  - multiscale.entropy

- title: Decomposition & time-frequency
  desc: >
    Data-adaptive decompositions of the recording into trend, rhythm, and noise.
  contents:
  - circadian.wavelet
  - wavelet.coi
  - circadian.emd
  - hilbert.huang
  - circadian.ssa
  - circadian.flm
  - curve.registration

- title: Sleep & rest detection
  desc: >
    Epoch sleep/wake scoring, rest-period and sleep-period-time detection, and
    locomotor inactivity during sleep.
  contents:
  - sleep.cole.kripke
  - sleep.sadeh
  - sleep.changepoints
  - rest.periods
  - rest.crespo
  - rest.hmm
  - rest.spt
  - sib.vanhees
  - sleep.from.spt
  - lids

- title: Phase, onset & regularity
  desc: >
    Sleep timing, regularity, and day-to-day phase stability.
  contents:
  - sleep.regularity.index
  - sri.matrix
  - social.jet.lag
  - composite.phase.deviation
  - phase.concentration
  - activity.onset.offset
  - circadian.onset.ci

- title: Batch & reporting workflow
  desc: >
    Run the pipeline over many recordings and export full analyses.
  contents:
  - circadian.batch
  - circadian.daily
  - circadian.raw
  - circadian.workbook
  - save.circadian.plot

- title: Plotting & theme
  desc: >
    ggplot2 plots and the package theme/palette.
  contents:
  - circadian-plots
  - plot_actogram
  - plot_periodogram
  - plot_chisq
  - plot_dfa
  - plot_extended_cosinor
  - theme_actiRhythm
  - set_actiRhythm_theme
  - scale_color_actiRhythm
  - scale_fill_actiRhythm
  - actiRhythm_colors

- title: C++ backend
  desc: >
    The compiled fast path behind the nonparametric metrics, and its controls.
  contents:
  - cpp_available
  - backend_info
  - circadian_cpp
  - IS_cpp
  - IV_cpp
  - L5M10_cpp
  - rolling_mean
  - rolling_sd
  - rolling_sum

- title: Print & plot methods
  desc: >
    S3 methods dispatched automatically when you print or plot a result object.
  contents:
  - starts_with("print.")
  - starts_with("plot.")

